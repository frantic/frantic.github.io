---
layout: default
title: Blog
permalink: /blog/
---

<div class="container">
  {% include header.html %}
  <main>
    <p class="system-text">Latest blog posts:</p>
    <div class="related-posts">
      <ul>
        {% for post in site.posts %}
        <li>
          <a href="{{ post.url }}">{{ post.title }}</a>{% if post.featured %} <span class="featured-star" title="Featured">★</span>{% endif %}
        </li>
        {% endfor %}
      </ul>
    </div>
  </main>
  {% include subscribe.html %} {% include footer.html %}
</div>
